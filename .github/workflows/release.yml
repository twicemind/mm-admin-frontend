name: Release

on:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run tests
        run: npm run test:ci
        
      - name: Build application
        run: npm run build:prod

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write
    outputs:
      version_tag: ${{ steps.release_type.outputs.version_tag }}
      is_prerelease: ${{ steps.release_type.outputs.is_prerelease }}
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Determine version bump
        id: version_bump
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "bump_type=${{ github.event.inputs.version_bump }}" >> $GITHUB_OUTPUT
          else
            # Analyze commit messages for conventional commits
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if [[ $COMMIT_MSG =~ ^feat(\(.+\))?!:|^BREAKING\ CHANGE: ]]; then
              echo "bump_type=major" >> $GITHUB_OUTPUT
            elif [[ $COMMIT_MSG =~ ^feat(\(.+\))?: ]]; then
              echo "bump_type=minor" >> $GITHUB_OUTPUT
            else
              echo "bump_type=patch" >> $GITHUB_OUTPUT
            fi
          fi
          
      - name: Bump version
        id: bump
        run: |
          npm version ${{ steps.version_bump.outputs.bump_type }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"
          
      - name: Determine release type
        id: release_type
        run: |
          if [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "version_tag=${{ steps.bump.outputs.new_version }}-rc" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_suffix=-rc" >> $GITHUB_OUTPUT
          else
            echo "version_tag=${{ steps.bump.outputs.new_version }}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_suffix=" >> $GITHUB_OUTPUT
          fi
          
      - name: Commit version bump
        run: |
          git add package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}${{ steps.release_type.outputs.release_suffix }}"
          
      - name: Create tag
        run: |
          git tag -a "v${{ steps.release_type.outputs.version_tag }}" -m "Release v${{ steps.release_type.outputs.version_tag }}"
          
      - name: Push changes
        run: |
          git push origin ${{ github.ref_name }}
          git push origin "v${{ steps.release_type.outputs.version_tag }}"
          
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.release_type.outputs.version_tag }}
          release_name: Release v${{ steps.release_type.outputs.version_tag }}
          body: |
            Release v${{ steps.release_type.outputs.version_tag }}
            
            Changes in this release:
            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: ${{ steps.release_type.outputs.is_prerelease }}

  build-container:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version_tag }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mm-admin-frontend
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.release.outputs.version_tag }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.release.outputs.version_tag }}
            type=raw,value=latest,enable=${{ needs.release.outputs.is_prerelease == 'false' }}
            type=raw,value=rc,enable=${{ needs.release.outputs.is_prerelease == 'true' }}
          
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./container/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository_owner }}/mm-admin-frontend:v${{ needs.release.outputs.version_tag }}
          format: cyclonedx-json
          output-file: sbom.json
          
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
